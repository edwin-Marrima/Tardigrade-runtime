name: Test

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Download binaries
        run: make download-bins TARGET_ARCH=amd64

      - name: Run tests
        run: go test ./...

  download-bins:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
#          - runner: ubuntu-24.04-arm
#            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        run: make download-bins TARGET_ARCH=${{ matrix.arch }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.arch }}
          path: ./.bin/
          retention-days: 1

  build-image:
    runs-on: ubuntu-latest
    needs: download-bins

    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: bins-amd64
          path: .bin/

      - name: Restore bin permissions
        run: chmod +x .bin/firecracker .bin/vmlinux .bin/busybox .bin/cni/ptp .bin/cni/host-local .bin/cni/tc-redirect-tap

      - name: Build rootfs image
        run: make rootfs-image
